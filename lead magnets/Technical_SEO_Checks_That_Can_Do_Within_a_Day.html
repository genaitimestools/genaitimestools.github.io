<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical SEO Checklist - One Day Sprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .checkbox-custom:checked + label {
            text-decoration: line-through;
            color: #94a3b8;
        }
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
        .card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        pre {
          background-color: #f3f4f6;
          padding: 1rem;
          border-radius: 6px;
          overflow-x: auto;
        }
        code {
          background-color: #f3f4f6;
          padding: 2px 4px;
          border-radius: 4px;
          font-family: monospace;
        }
        .link {
          color:#3b82f6;
          text-decoration: none;
        }
        @media screen and (min-width:320px) {
          pre {
            padding:14px;
          }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header Section -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Technical SEO Checks That Can Do Within a Day</h1>     
            <!-- Progress Tracker -->
            <div class="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Audit Completion</span>
                    <span id="progress-text" class="text-sm font-bold text-blue-600">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-4">
                    <div id="progress-bar" class="progress-bar bg-blue-500 h-4 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Phase 1 -->
        <section class="mb-10">
            <div class="flex items-center mb-6">
                <div class="bg-blue-100 p-2 rounded-lg mr-3">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Phase 1: Access & Indexing</h2>
                <span class="ml-auto text-sm font-medium text-slate-500 italic">Morning</span>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t1" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t1" class="text-slate-700">
                        <span class="font-bold block">Robots.txt Blockers</span>
                        <span class="text-sm">Are your robots.txt blocking any critical content? Use this <a class="link" href="https://robotstxt.com/tester" target="_blank">robots.txt tester</a>.</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t2" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t2" class="text-slate-700">
                        <span class="font-bold block">Sitemap Accuracy</span>
                        <span class="text-sm">Is your sitemap clean (200 OK only) and submitted to <a class="link" href="https://search.google.com/search-console" target="_blank">Google Search Console</a>?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t3" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t3" class="text-slate-700">
                        <span class="font-bold block">Indexing Errors</span>
                        <span class="text-sm">Does <a class="link" href="https://search.google.com/search-console" target="_blank">Google Search Console</a> report any broken (404) or excluded pages?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t4" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t4" class="text-slate-700">
                        <span class="font-bold block">Verify Canonical Tags</span>
                        <span class="text-sm">Are some page's URLs in the canonical tags 
                          <code>&lt;link href&equals;'<b>(Your page URL here)</b>' rel&equals;'canonical'/&gt;</code>
                          correctly formatted?
                        </span>
                        <div class="mt-2 space-y-1">
                          <p style="margin-top:5px; margin-bottom:5px;">❌</p>
                          <pre style="margin-bottom:10px;">http://www.example.com</pre>
                          <p style="margin-bottom:5px;">⭕</p>
                          <pre>https://www.example.com</pre>
                        </div>
                    </label>
                </div>
            </div>
        </section>

        <!-- Phase 2 -->
        <section class="mb-10">
            <div class="flex items-center mb-6">
                <div class="bg-purple-100 p-2 rounded-lg mr-3">
                    <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Phase 2: Links & Layout</h2>
                <span class="ml-auto text-sm font-medium text-slate-500 italic">Midday</span>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t6" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t6" class="text-slate-700">
                        <span class="font-bold block">Key Page Linking</span>
                        <span class="text-sm">Do your most important pages receive links from high-authority content?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t7" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t7" class="text-slate-700">
                        <span class="font-bold block">Breadcrumb Markup</span>
                        <span class="text-sm">Are breadcrumbs present and correctly marked up with Schema?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t8" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t8" class="text-slate-700">
                        <span class="font-bold block">Mobile Tap Targets</span>
                        <span class="text-sm">Is there enough space between buttons for easy mobile tapping?</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Phase 3 -->
        <section class="mb-10">
            <div class="flex items-center mb-6">
                <div class="bg-green-100 p-2 rounded-lg mr-3">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Phase 3: Load Speed</h2>
                <span class="ml-auto text-sm font-medium text-slate-500 italic">Afternoon</span>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t10" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t10" class="text-slate-700">
                        <span class="font-bold block">Core Web Vitals</span>
                        <span class="text-sm">Are your LCP and CLS scores "Good" in <a class="link" href="https://pagespeed.web.dev/" target="_blank">PageSpeed Insights</a>?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 space-y-4">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Quick Optimization:</p>
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" id="t11" class="checkbox-custom h-4 w-4 rounded border-gray-300">
                        <label for="t11" class="text-sm text-slate-600">Are images compressed (under 200KB)?</label>
                    </div>
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" id="t13" class="checkbox-custom h-4 w-4 rounded border-gray-300">
                        <label for="t13" class="text-sm text-slate-600">Is CSS and JS code minified?</label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Phase 4 -->
        <section class="mb-12">
            <div class="flex items-center mb-6">
                <div class="bg-orange-100 p-2 rounded-lg mr-3">
                    <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Phase 4: Final Scan</h2>
                <span class="ml-auto text-sm font-medium text-slate-500 italic">Late Afternoon</span>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t14" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t14" class="text-slate-700">
                        <span class="font-bold block">Valid Structured Data</span>
                        <span class="text-sm">Does the <a class="link" href="https://validator.schema.org/" target="_blank">Schema Validator</a> confirm your code is error-free?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t15" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t15" class="text-slate-700">
                        <span class="font-bold block">Noindex Check</span>
                        <span class="text-sm">Are you sure no live pages accidentally have a "noindex" tag?</span>
                    </label>
                </div>
                <div class="card bg-white p-5 rounded-xl border border-slate-200 flex items-start space-x-4">
                    <input type="checkbox" id="t16" class="checkbox-custom mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="t16" class="text-slate-700">
                        <span class="font-bold block">Crawler Verification</span>
                        <span class="text-sm">Have you checked if there are broken links with crawlers like <a class="link" href="https://www.screamingfrog.co.uk/seo-spider" target="_blank">Screaming Frog</a>?</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Summary Footer -->
        <footer class="text-center pb-20">
            <div class="inline-block bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-lg">
                <p class="text-sm font-medium opacity-80 mb-1 uppercase tracking-widest text-slate-400">Toolkit</p>
                <div class="flex flex-wrap justify-center gap-4 text-xs font-bold">
                    <span><a href="https://search.google.com/search-console" target="_blank">GOOGLE SEARCH CONSOLE</a></span>
                    <span class="text-slate-600">•</span>
                    <span><a href="https://pagespeed.web.dev/" target="_blank">PAGESPEED</a></span>
                    <span class="text-slate-600">•</span>
                    <span><a href="https://www.screamingfrog.co.uk/seo-spider/" target="_blank">SCREAMING FROG</a></span>
                    <span class="text-slate-600">•</span>
                    <span><a href="https://validator.schema.org/" target="_blank">VALIDATOR</a></span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        function updateProgress() {
            const total = checkboxes.length;
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const percentage = Math.round((checked / total) * 100);
            
            progressBar.style.width = percentage + '%';
            progressText.innerText = percentage + '%';
        }

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', updateProgress);
        });

        updateProgress();
    </script>
</body>
</html>
